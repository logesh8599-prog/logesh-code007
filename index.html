<!DOCTYPE html>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial;
}

/* Navigation bar */
.navbar{
display:flex;
align-items:center;
justify-content:space-between;
background:#1f6fb2;
height:60px;
}

/* Left side (logo + text) */
.nav-left{
display:flex;
align-items:center;
color:white;
font-size:18px;
font-weight:bold;
padding-left:15px;
}

/* Logo */
.nav-left img{
height:35px;
margin-right:10px;
}

/* Menu button */
.menu{
background:#f28c00;
height:60px;
width:60px;
display:flex;
align-items:center;
justify-content:center;
font-size:25px;
color:white;
cursor:pointer;
}

/* Sidebar */
.sidebar{
height:100%;
width:0;
position:fixed;
top:0;
right:0;
background:#111;
overflow-x:hidden;
transition:0.4s;
padding-top:60px;
}

/* Sidebar links */
.sidebar a{
padding:12px 20px;
text-decoration:none;
font-size:18px;
color:white;
display:block;
}

.sidebar a:hover{
background:#575757;
}

/* Close button */
.closebtn{
position:absolute;
top:10px;
right:20px;
font-size:30px;
cursor:pointer;
}

</style>

<script>

function openMenu(){
document.getElementById("mySidebar").style.width="250px";
}

function closeMenu(){
document.getElementById("mySidebar").style.width="0";
}

</script>

</head>

<body>
